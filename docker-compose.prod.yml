# Tamanya 프로덕션(단일 VM) — DB + 백엔드 + nginx(프론트).
# 실행:  docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aidiary}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aidiary}
      POSTGRES_DB: ${POSTGRES_DB:-aidiary}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aidiary}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # 포트 미노출 — 내부 네트워크로만 접근 (외부 5432 차단)

  backend:
    build: ./backend
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # 포트 미노출 — nginx(web)만 내부에서 8000 접근

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: "/"
        VITE_AI_ENABLED: "true"
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
