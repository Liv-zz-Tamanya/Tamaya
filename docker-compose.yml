services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: livzz-postgres
    environment:
      POSTGRES_USER: aidiary
      POSTGRES_PASSWORD: aidiary
      POSTGRES_DB: aidiary
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidiary"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
