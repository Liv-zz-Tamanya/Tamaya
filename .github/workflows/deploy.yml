name: Deploy to NCP

# main 또는 feat/nickname-auth 에 push되면 자동 배포. 수동 실행(workflow_dispatch)도 가능.
on:
  push:
    branches: [main, feat/nickname-auth]
  workflow_dispatch:

concurrency:
  group: deploy-ncp
  cancel-in-progress: false   # 배포 도중 취소하지 않음

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          command_timeout: 30m       # 최초 빌드(torch 등)가 오래 걸릴 수 있음
          script: |
            set -e
            cd ~/tamanya
            echo "[deploy] pulling ${{ github.ref_name }} ..."
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            echo "[deploy] building & restarting containers ..."
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
            docker image prune -f
            echo "[deploy] done."
